<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="드라이브 트래커">
  <meta name="theme-color" content="#185FA5">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>드라이브 트래커</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #185FA5; --blue-light: #E6F1FB; --blue-mid: #378ADD;
      --red: #A32D2D; --red-light: #FCEBEB;
      --text: #1a1a1a; --text2: #666; --text3: #999;
      --bg: #f5f5f5; --bg2: #fff; --bg3: #f0f0f0;
      --border: rgba(0,0,0,0.1);
      --radius: 12px; --radius-sm: 8px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text: #f0f0f0; --text2: #aaa; --text3: #666;
        --bg: #111; --bg2: #1e1e1e; --bg3: #2a2a2a;
        --border: rgba(255,255,255,0.1);
        --blue-light: #0c2a47;
      }
    }
    html, body { height: 100%; background: var(--bg); font-family: -apple-system, sans-serif; color: var(--text); overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100%; padding-top: var(--safe-top); }
    .topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .topbar h1 { font-size: 17px; font-weight: 600; }
    .status-pill { display: flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 20px; font-size: 12px; background: var(--bg3); color: var(--text2); }
    .status-pill.on { background: var(--red-light); color: var(--red); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .blink { animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .content { flex: 1; overflow-y: auto; padding: 14px 14px 0; -webkit-overflow-scrolling: touch; }
    .nav { background: var(--bg2); border-top: 1px solid var(--border); display: flex; padding-bottom: var(--safe-bottom); flex-shrink: 0; }
    .nav-btn { flex: 1; border: none; background: none; padding: 10px 0 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; color: var(--text3); cursor: pointer; }
    .nav-btn.active { color: var(--blue); }
    .nav-btn svg { width: 22px; height: 22px; }
    .screen { display: none; }
    .screen.active { display: block; }
    .card { background: var(--bg2); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; }
    .big-num { font-size: 48px; font-weight: 300; color: var(--text); line-height: 1; }
    .big-unit { font-size: 20px; color: var(--text2); }
    .label { font-size: 13px; color: var(--text2); margin-bottom: 6px; }
    .sub-label { font-size: 12px; color: var(--text3); margin-top: 6px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .metric { background: var(--bg3); border-radius: var(--radius-sm); padding: 14px; }
    .metric .val { font-size: 22px; font-weight: 500; }
    .metric .lbl { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    #mapBox { background: var(--bg3); border-radius: var(--radius); height: 220px; margin-bottom: 12px; overflow: hidden; position: relative; }
    #mapBox canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    #mapMsg { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text3); font-size: 13px; gap: 8px; }
    #mapMsg svg { width: 36px; height: 36px; opacity: .4; }
    .btn-big { width: 100%; padding: 16px; border-radius: var(--radius); border: none; font-size: 16px; font-weight: 600; cursor: pointer; }
    .btn-start { background: var(--blue); color: #fff; }
    .btn-stop { background: var(--red); color: #fff; }
    .trip-item { background: var(--bg2); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .trip-info .date { font-size: 13px; color: var(--text2); }
    .trip-info .dur { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .trip-dist { font-size: 17px; font-weight: 500; }
    .empty { text-align: center; padding: 40px 0; color: var(--text3); font-size: 14px; }
    .tab-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .tab { padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border); background: none; font-size: 13px; color: var(--text2); cursor: pointer; }
    .tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    .bar-wrap { display: flex; align-items: flex-end; gap: 5px; height: 90px; margin-top: 14px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 3px; background: #B5D4F4; }
    .bar.today-bar { background: var(--blue); }
    .bar-lbl { font-size: 10px; color: var(--text3); }
    .month-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .month-row:last-child { border: none; }
    .month-name { font-size: 14px; width: 32px; flex-shrink: 0; }
    .month-bar-bg { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .month-bar-fill { height: 100%; background: var(--blue-mid); border-radius: 3px; }
    .month-km { font-size: 13px; font-weight: 500; width: 55px; text-align: right; flex-shrink: 0; }
    .sect-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    pb { display: block; height: 14px; }
  </style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <h1>드라이브 트래커</h1>
    <div class="status-pill" id="pill">
      <div class="dot" id="dot"></div>
      <span id="pillTxt">대기 중</span>
    </div>
  </div>

  <div class="content" id="content">
    <!-- 홈 -->
    <div class="screen active" id="s-home">
      <div class="card" style="text-align:center;">
        <div class="label">오늘 이동거리</div>
        <div class="big-num" id="distNow">0.0<span class="big-unit"> km</span></div>
        <div class="sub-label" id="timer">주행 시간: 0분 0초</div>
      </div>
      <div class="grid2">
        <div class="metric"><div class="lbl">현재 속도</div><div class="val" id="speed">0 km/h</div></div>
        <div class="metric"><div class="lbl">이번 달</div><div class="val" id="monthKm">-- km</div></div>
      </div>
      <div id="mapBox">
        <canvas id="mapCanvas"></canvas>
        <div id="mapMsg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          <span>기록 시작 시 경로 표시</span>
        </div>
      </div>
      <button class="btn-big btn-start" id="recBtn" onclick="toggleRec()">기록 시작</button>
      <pb></pb>
    </div>

    <!-- 기록 -->
    <div class="screen" id="s-trips">
      <div class="sect-title">주행 기록</div>
      <div id="tripList"></div>
      <pb></pb>
    </div>

    <!-- 통계 -->
    <div class="screen" id="s-stats">
      <div class="tab-row">
        <button class="tab active" onclick="switchTab('daily',this)">일간</button>
        <button class="tab" onclick="switchTab('monthly',this)">월간</button>
      </div>
      <div id="t-daily">
        <div class="card">
          <div class="sect-title">최근 7일 이동거리</div>
          <div class="bar-wrap" id="barWrap"></div>
        </div>
        <div class="grid2">
          <div class="metric"><div class="lbl">주간 합계</div><div class="val" id="wkTotal">--</div></div>
          <div class="metric"><div class="lbl">일 평균</div><div class="val" id="dayAvg">--</div></div>
        </div>
      </div>
      <div id="t-monthly" style="display:none;">
        <div class="card" id="monthList"></div>
      </div>
      <pb></pb>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="go('home',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      홈
    </button>
    <button class="nav-btn" onclick="go('trips',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
      기록
    </button>
    <button class="nav-btn" onclick="go('stats',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      통계
    </button>
  </nav>
</div>

<script>
  let rec=false, wid=null, t0=null, dist=0, lastP=null, pts=[], timerID=null, simID=null;
  let trips = JSON.parse(localStorage.getItem('dt_trips')||'[]');

  function haversine(a,b,c,d){
    const R=6371,dLat=(c-a)*Math.PI/180,dLon=(d-b)*Math.PI/180;
    const x=Math.sin(dLat/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
  }

  function monthTotal(){
    const m=new Date().getMonth(), y=new Date().getFullYear();
    return trips.filter(t=>{ const d=new Date(t.ts); return d.getMonth()===m&&d.getFullYear()===y; }).reduce((s,t)=>s+t.dist,0);
  }

  function updateMonthKm(){ document.getElementById('monthKm').textContent=(monthTotal()).toFixed(1)+' km'; }

  function toggleRec(){ rec ? stopRec() : startRec(); }

  function startRec(){
    rec=true; t0=Date.now(); dist=0; lastP=null; pts=[];
    document.getElementById('recBtn').textContent='기록 중지';
    document.getElementById('recBtn').className='btn-big btn-stop';
    document.getElementById('pill').className='status-pill on';
    document.getElementById('dot').className='dot blink';
    document.getElementById('pillTxt').textContent='기록 중';
    document.getElementById('mapMsg').style.display='none';
    timerID=setInterval(()=>{
      const s=Math.floor((Date.now()-t0)/1000);
      document.getElementById('timer').textContent=`주행 시간: ${Math.floor(s/60)}분 ${s%60}초`;
    },1000);
    if(navigator.geolocation){
      wid=navigator.geolocation.watchPosition(onGPS, null, {enableHighAccuracy:true,maximumAge:2000,timeout:10000});
    }
    let sLat=37.5665+(Math.random()-.5)*.01, sLng=126.978+(Math.random()-.5)*.01;
    simID=setInterval(()=>{
      if(!rec){clearInterval(simID);return;}
      sLat+=(Math.random()-.45)*.0009; sLng+=(Math.random()-.45)*.0009;
      if(lastP){ const d=haversine(lastP.a,lastP.o,sLat,sLng); dist+=d; updateDist(d); }
      lastP={a:sLat,o:sLng}; pts.push({a:sLat,o:sLng}); drawPath();
    },1800);
  }

  function onGPS(p){
    const {latitude:a,longitude:o}=p.coords;
    if(lastP&&!lastP.sim){ const d=haversine(lastP.a,lastP.o,a,o); if(d>.003){dist+=d;updateDist(d);} }
    lastP={a,o,sim:false}; pts.push({a,o}); drawPath();
  }

  function updateDist(delta){
    document.getElementById('distNow').innerHTML=dist.toFixed(2)+'<span class="big-unit"> km</span>';
    const elH=(Date.now()-t0)/3600000;
    document.getElementById('speed').textContent=Math.min(Math.round(delta/elH*.4),130)+' km/h';
  }

  function stopRec(){
    rec=false;
    clearInterval(timerID); clearInterval(simID);
    if(wid) navigator.geolocation.clearWatch(wid);
    document.getElementById('recBtn').textContent='기록 시작';
    document.getElementById('recBtn').className='btn-big btn-start';
    document.getElementById('pill').className='status-pill';
    document.getElementById('dot').className='dot';
    document.getElementById('pillTxt').textContent='대기 중';
    document.getElementById('speed').textContent='0 km/h';
    if(dist>.01){
      const s=Math.floor((Date.now()-t0)/1000);
      trips.unshift({ts:new Date().toISOString(),dist,dur:s});
      localStorage.setItem('dt_trips',JSON.stringify(trips.slice(0,200)));
      updateMonthKm();
    }
    dist=0; lastP=null; pts=[];
    document.getElementById('distNow').innerHTML='0.0<span class="big-unit"> km</span>';
    document.getElementById('timer').textContent='주행 시간: 0분 0초';
    document.getElementById('mapMsg').style.display='flex';
    clearCanvas();
  }

  function drawPath(){
    const c=document.getElementById('mapCanvas'), ctx=c.getContext('2d');
    c.width=c.offsetWidth; c.height=c.offsetHeight;
    if(pts.length<2)return;
    const lats=pts.map(p=>p.a), lngs=pts.map(p=>p.o);
    const mnLat=Math.min(...lats),mxLat=Math.max(...lats),mnLng=Math.min(...lngs),mxLng=Math.max(...lngs);
    const pad=28;
    const tx=o=>pad+(o-mnLng)/(mxLng-mnLng+.000001)*(c.width-pad*2);
    const ty=a=>(c.height-pad)-(a-mnLat)/(mxLat-mnLat+.000001)*(c.height-pad*2);
    ctx.clearRect(0,0,c.width,c.height);
    ctx.beginPath(); ctx.strokeStyle='#378ADD'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.lineJoin='round';
    pts.forEach((p,i)=>i===0?ctx.moveTo(tx(p.o),ty(p.a)):ctx.lineTo(tx(p.o),ty(p.a)));
    ctx.stroke();
    const lp=pts[pts.length-1];
    ctx.beginPath(); ctx.arc(tx(lp.o),ty(lp.a),8,0,Math.PI*2);
    ctx.fillStyle='#185FA5'; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
  }

  function clearCanvas(){ const c=document.getElementById('mapCanvas'); c.getContext('2d').clearRect(0,0,c.width,c.height); }

  function renderTrips(){
    const el=document.getElementById('tripList');
    if(!trips.length){ el.innerHTML='<div class="empty">아직 기록된 주행이 없습니다</div>'; return; }
    el.innerHTML=trips.slice(0,30).map(t=>{
      const d=new Date(t.ts);
      const dateStr=d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
      const durStr=`${Math.floor(t.dur/60)}분 ${t.dur%60}초`;
      return `<div class="trip-item"><div class="trip-info"><div class="date">${dateStr}</div><div class="dur">${durStr}</div></div><div class="trip-dist">${t.dist.toFixed(2)} km</div></div>`;
    }).join('');
  }

  function renderStats(){
    const today=new Date(), days=['월','화','수','목','금','토','오늘'];
    const data=Array.from({length:7},(_,i)=>{
      if(i===6) return trips.filter(t=>{ const d=new Date(t.ts); return d.toDateString()===today.toDateString(); }).reduce((s,t)=>s+t.dist,0);
      const d=new Date(today); d.setDate(d.getDate()-(6-i));
      return trips.filter(t=>new Date(t.ts).toDateString()===d.toDateString()).reduce((s,t)=>s+t.dist,0);
    });
    const mx=Math.max(...data,1);
    document.getElementById('barWrap').innerHTML=data.map((v,i)=>`
      <div class="bar-col">
        <div class="bar${i===6?' today-bar':''}" style="height:${Math.round(v/mx*85)}px"></div>
        <div class="bar-lbl">${days[i]}</div>
      </div>`).join('');
    const wk=data.reduce((a,b)=>a+b,0);
    document.getElementById('wkTotal').textContent=wk.toFixed(1)+' km';
    document.getElementById('dayAvg').textContent=(wk/7).toFixed(1)+' km';
    const months=[];
    for(let i=5;i>=0;i--){ const d=new Date(today); d.setMonth(d.getMonth()-i); months.push({y:d.getFullYear(),m:d.getMonth()}); }
    const mData=months.map(({y,m})=>({ name:(m+1)+'월', km:trips.filter(t=>{const d=new Date(t.ts);return d.getFullYear()===y&&d.getMonth()===m;}).reduce((s,t)=>s+t.dist,0) }));
    const mkx=Math.max(...mData.map(m=>m.km),1);
    document.getElementById('monthList').innerHTML=mData.map(m=>`
      <div class="month-row">
        <div class="month-name">${m.name}</div>
        <div class="month-bar-bg"><div class="month-bar-fill" style="width:${Math.round(m.km/mkx*100)}%"></div></div>
        <div class="month-km">${m.km.toFixed(1)} km</div>
      </div>`).join('');
  }

  function switchTab(tab,btn){
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
    document.getElementById('t-daily').style.display=tab==='daily'?'block':'none';
    document.getElementById('t-monthly').style.display=tab==='monthly'?'block':'none';
  }

  function go(name,btn){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('s-'+name).classList.add('active'); btn.classList.add('active');
    document.getElementById('content').scrollTop=0;
    if(name==='trips') renderTrips();
    if(name==='stats') renderStats();
  }

  if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  updateMonthKm();
</script>
</body>
</html>
